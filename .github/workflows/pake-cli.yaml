name: Build App With Pake CLI

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform"
        required: true
        default: "macos-latest"
        type: choice
        options:
          - "windows-latest"
          - "macos-latest"
          - "ubuntu-24.04"
      url:
        description: "Website URL"
        required: true
      name:
        description: "App name (lowercase for Linux)"
        required: true
      icon:
        description: "Icon URL, auto-fetch if empty"
        required: false
      width:
        description: "Window width (px)"
        required: false
        default: "1200"
      height:
        description: "Window height (px)"
        required: false
        default: "780"
      min_width:
        description: "Minimum window width (px)"
        required: false
      min_height:
        description: "Minimum window height (px)"
        required: false
      app_version:
        description: "App version"
        required: false
        default: "1.0.0"
      fullscreen:
        description: "Start in fullscreen mode"
        required: false
        type: boolean
        default: false
      hide_title_bar:
        description: "Hide title bar (macOS only)"
        required: false
        type: boolean
        default: false
      multi_arch:
        description: "Universal binary (macOS only)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Package formats (comma-separated: deb,appimage,rpm,zst)"
        required: false
        default: "deb"
      browser_extensions_enabled:
        description: "Enable browser extensions"
        required: false
        type: boolean
        default: false
      additional_browser_args:
        description: "Additional browser arguments"
        required: false
        default: ""
      data_directory:
        description: "Data directory"
        required: false
        default: ""
      devtools:
        description: "Enable devtools"
        required: false
        type: boolean
        default: false
      incognito:
        description: "Enable incognito mode"
        required: false
        type: boolean
        default: false
      proxy_url:
        description: "Proxy URL"
        required: false
        default: ""
      user_agent:
        description: "Custom user agent"
        required: false
        default: ""
      window_classname:
        description: "Window class name (Windows only)"
        required: false
        default: ""
      window_effects_config:
        description: "Window effects config (JSON object)"
        required: false
        default: "{}"
      zoom_hotkeys_enabled:
        description: "Enable zoom hotkeys"
        required: false
        type: boolean
        default: false
      extra_conf:
        description: "Extra Tauri config (JSON object)"
        required: false
        default: "{}"
      base_conf_file:
        description: "Base Tauri config file (JSON)"
        required: false
        default: ""


jobs:
  build:
    name: ${{ inputs.platform }}
    runs-on: ${{ inputs.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - if:  ${{ contains(inputs.platform, 'windows') }}
        name: Windows base config file
        run: echo "platform_base_conf_file=src-tauri/tauri.windows.conf.json" >> "$GITHUB_ENV"
      - if:  ${{ contains(inputs.platform, 'macos') }}
        name: macOS base config file
        run: echo "platform_base_conf_file=src-tauri/tauri.macos.conf.json" >> "$GITHUB_ENV"
      - if:  ${{ contains(inputs.platform, 'ubuntu') }}
        name: Linux base config file
        run: echo "platform_base_conf_file=src-tauri/tauri.linux.conf.json" >> "$GITHUB_ENV"

      - name: Determine base config file
        id: determine_base_conf
        run: |
          if [ -z "${{ inputs.base_conf_file }}" ]; then
            echo "No base config file provided, using default based on platform: $platform_base_conf_file"
            echo "base_conf_file=$platform_base_conf_file" >> "$GITHUB_ENV"
          else
            echo "Using provided base config file: ${{ inputs.base_conf_file }}"
            echo "base_conf_file=${{ inputs.base_conf_file }}" >> "$GITHUB_ENV"
          fi

      - name: Write deepmerge python script
        run: |
          cat << 'EOF' > _deepmerge.py
          import json
          import sys

          def deep_merge(base, extra):
              if isinstance(base, list) and isinstance(extra, list):
                  for idx, value in enumerate(extra):
                      if idx < len(base) and isinstance(base[idx], dict) and isinstance(value, dict):
                          base[idx] = deep_merge(base[idx], value)
                      else:
                          base.append(value)
                  return base
              elif isinstance(base, dict) and isinstance(extra, dict):
                  for key, value in extra.items():
                      if key in base and isinstance(base[key], dict) and isinstance(value, dict):
                          base[key] = deep_merge(base[key], value)
                      else:
                          base[key] = value
              return base

          if __name__ == "__main__":
              base_conf = json.loads(sys.argv[1])
              extra_conf = json.loads(sys.argv[2])
              indent = int(sys.argv[3]) if len(sys.argv) > 3 else None
              merged_conf = deep_merge(base_conf, extra_conf)
              print(json.dumps(merged_conf, separators=(",", ":") if indent is None else None, indent=indent))
          EOF

      - name: Prepare base configuration
        run: |
          base_cfg="{}"
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"browserExtensionsEnabled": ${{ inputs.browser_extensions_enabled }}}]}}')
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"additionalBrowserArgs": "${{ inputs.additional_browser_args }}"}]}}')
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"dataDirectory": "${{ inputs.data_directory }}"}]}}')
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"devtools": ${{ inputs.devtools }}}]}}')
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"incognito": ${{ inputs.incognito }}}]}}')
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"proxyUrl": "${{ inputs.proxy_url }}"}]}}')
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"userAgent": "${{ inputs.user_agent }}"}]}}')
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"windowClassname": "${{ inputs.window_classname }}"}]}}')
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"windowEffectsConfig": ${{ inputs.window_effects_config }}}]}}')
          base_cfg=$(python3 _deepmerge.py "$base_cfg" '{"pake": {"windows": [{"zoomHotkeysEnabled": ${{ inputs.zoom_hotkeys_enabled }}}]}}')
          echo "base_cfg=$base_cfg" >> "$GITHUB_ENV"


      - name: Prepare conf files
        run: |
          BASE_CONF=$(<"$base_conf_file")
          BASE_CONF=$(python3 _deepmerge.py "$BASE_CONF" "$base_cfg")
          echo "::notice title=Base-configuration::Base configuration after merging pake settings:\n${BASE_CONF}"
          EXTRA_CONF='${{ inputs.extra_conf }}'
          MERGED_CONF=$(python3 _deepmerge.py "$BASE_CONF" "$EXTRA_CONF")
          echo "::notice title=Merged-configuration::Merged configuration after merging extra settings:\n${MERGED_CONF}"
          echo "$MERGED_CONF" > "$base_conf_file"

      - name: Build CLI
        run: pnpm run cli:build

      - name: Setup mold linker
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      - name: Rust cache restore
        uses: actions/cache/restore@v4.2.0
        id: cache_store
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}

      - name: Build App (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 25
        shell: bash
        run: |
          ARGS=("${{ inputs.url }}" "--name" "${{ inputs.name }}")

          if [ -n "${{ inputs.icon }}" ]; then
            ARGS+=("--icon" "${{ inputs.icon }}")
          fi

          if [ -n "${{ inputs.width }}" ]; then
            ARGS+=("--width" "${{ inputs.width }}")
          fi

          if [ -n "${{ inputs.height }}" ]; then
            ARGS+=("--height" "${{ inputs.height }}")
          fi

          if [ -n "${{ inputs.min_width }}" ]; then
            ARGS+=("--min-width" "${{ inputs.min_width }}")
          fi

          if [ -n "${{ inputs.min_height }}" ]; then
            ARGS+=("--min-height" "${{ inputs.min_height }}")
          fi

          if [ -n "${{ inputs.app_version }}" ]; then
            ARGS+=("--app-version" "${{ inputs.app_version }}")
          fi

          if [ "${{ inputs.fullscreen }}" == "true" ]; then
            ARGS+=("--fullscreen")
          fi

          if [ "${{ inputs.hide_title_bar }}" == "true" ]; then
            ARGS+=("--hide-title-bar")
          fi

          if [ "${{ inputs.multi_arch }}" == "true" ]; then
            ARGS+=("--multi-arch")
          fi

          if [ -n "${{ inputs.targets }}" ] && [ "${{ runner.os }}" == "Linux" ]; then
            ARGS+=("--targets" "${{ inputs.targets }}")
          fi

          echo "Running: node dist/cli.js ${ARGS[@]}"
          node dist/cli.js "${ARGS[@]}"

      - name: Build App (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 25
        shell: pwsh
        run: |
          $args = "${{ inputs.url }}", "--name", "${{ inputs.name }}"

          if ("${{ inputs.icon }}" -ne "") {
            $args += "--icon", "${{ inputs.icon }}"
          }

          if ("${{ inputs.width }}" -ne "") {
            $args += "--width", "${{ inputs.width }}"
          }

          if ("${{ inputs.height }}" -ne "") {
            $args += "--height", "${{ inputs.height }}"
          }

          if ("${{ inputs.min_width }}" -ne "") {
            $args += "--min-width", "${{ inputs.min_width }}"
          }

          if ("${{ inputs.min_height }}" -ne "") {
            $args += "--min-height", "${{ inputs.min_height }}"
          }

          if ("${{ inputs.app_version }}" -ne "") {
            $args += "--app-version", "${{ inputs.app_version }}"
          }

          if ("${{ inputs.fullscreen }}" -eq "true") {
            $args += "--fullscreen"
          }

          if ("${{ inputs.hide_title_bar }}" -eq "true") {
            $args += "--hide-title-bar"
          }

          Write-Host "Running: node dist/cli.js $($args -join ' ')"
          node dist/cli.js $args

          git checkout -- src-tauri/Cargo.lock

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-macOS
          path: ${{ inputs.name }}.dmg
          retention-days: 3

      - name: Upload DEB (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-deb
          path: ${{ inputs.name }}.deb
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload AppImage (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-AppImage
          path: ${{ inputs.name }}.AppImage
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload RPM (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-rpm
          path: ${{ inputs.name }}.rpm
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload ZST (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Linux-zst
          path: ${{ inputs.name }}-*.pkg.tar.zst
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload MSI (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.name }}-Windows
          path: ${{ inputs.name }}.msi
          retention-days: 3

      - name: Rust cache store
        uses: actions/cache/save@v4.2.0
        if: steps.cache_store.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}
